name: Build Docker Image

on:
    push:
        branches:
          - main
    pull_request:
        branches:
          - main

jobs:
    build: 
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
        
          - name: Setup Docker Buildx
            uses: docker/setup-buildx-action@v3

          - name: Configue AWS Credentials
            uses: aws-actions/configure-aws-credentials@v4
            with:
                aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
                aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
                aws-region: ${{secrets.AWS_REGION}}

          - name: Login to AWS ECR
            run: |
                aws ecr get-login-password --region ${{secrets.AWS_REGION}} \
                | docker login --username AWS --password-stdin 164990027237.dkr.ecr.ap-south-1.amazonaws.com/schoolapi

          - name: Build Docker Image
            run: docker compose build

          - name: Tag Docker Image
            run: docker tag schoolapi:latest 164990027237.dkr.ecr.ap-south-1.amazonaws.com/schoolapi:latest

          - name: Push Docker Image
            run: docker push 164990027237.dkr.ecr.ap-south-1.amazonaws.com/schoolapi:latest
        
          - name: Deploy to EC2
            uses: appleboy/ssh-action@v1.0.3
            with:
                host: ${{secrets.EC2_HOST}}
                username: ${{secrets.EC2_USER}}
                key: ${{secrets.EC2_SSH_KEY}}
                script: |
                    export AWS_DEFAULT_REGION=ap-south-1

                    aws sts get-caller-identity

                    aws ecr get-login-password --region ap-south-1 \
                    | docker login --username aws --password-stdin 164990027237.dkr.ecr.ap-south-1.amazonaws.com

                    docker system prune -af

                    docker pull 164990027237.dkr.ecr.ap-south-1.amazonaws.com/schoolapi:latest

                    docker-compose down
                    docker-compose up -d
