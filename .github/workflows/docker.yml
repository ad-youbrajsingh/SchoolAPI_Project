name: Build Docker Image

on:
    push:
        branches:
          - main
    pull_request:
        branches:
          - main

jobs:
    build: 
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
            
          - name: Setup Docker Buildx
            uses: docker/setup-buildx-action@v3

          - name: Build Docker Image
            run: docker compose build